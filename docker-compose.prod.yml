services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/app/data/prod.sqlite
      NUXT_DATABASE_URL: file:/app/data/prod.sqlite
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-${NUXT_PUBLIC_SITE_URL}}
    volumes:
      - notes_prod_data:/app/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  notes_prod_data:
  caddy_data:
  caddy_config:
